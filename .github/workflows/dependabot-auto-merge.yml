# Enables GitHub auto-merge on Dependabot minor/patch PRs; the merge itself
# waits for the required status checks defined in the branch ruleset.
# Squash is the only merge method compatible with the ruleset
# (required_linear_history rejects merge commits, required_signatures
# rejects rebase-merged commits).

name: Dependabot auto-merge

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # For grouped PRs, update-type reflects the highest bump in the group,
      # so a group containing a major update is excluded.
      - name: Enable auto-merge
        if: contains(fromJSON('["version-update:semver-minor", "version-update:semver-patch"]'), steps.metadata.outputs.update-type)
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
